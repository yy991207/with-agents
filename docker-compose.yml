# multi-chat 本地依赖
# 只跑 MongoDB 后端开发期裸跑 uvicorn --reload 不容器化后端
# 用法 docker compose up -d mongo

services:
  mongo:
    image: mongo:7
    container_name: multi-chat-mongo
    ports:
      - "27017:27017"
    volumes:
      - ./docker/mongo-data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: multi-chat-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./docker/minio-data:/data
    restart: unless-stopped
